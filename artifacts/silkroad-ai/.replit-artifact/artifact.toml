kind = "web"
previewPath = "/"
title = "Silkroad AI Controller"
version = "1.0.0"
id = "artifacts/silkroad-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21153

[services.development]
run = "pnpm --filter @workspace/silkroad-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/silkroad-ai", "run", "build" ]
publicDir = "artifacts/silkroad-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21153"
BASE_PATH = "/"
